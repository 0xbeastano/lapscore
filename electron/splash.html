<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LapScore</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #080810;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* Ambient glow */
    .glow {
      position: absolute;
      top: -30%;
      left: 10%;
      width: 80%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Score ring animation */
    .ring-wrap {
      width: 80px; height: 80px;
      position: relative;
      animation: pulse-ring 2s ease-in-out infinite;
    }

    .ring-wrap svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg { stroke: #1c1c36; }
    .ring-fg {
      stroke: #7c3aed;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: ring-fill 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      filter: drop-shadow(0 0 8px rgba(124,58,237,0.5));
    }

    .ring-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -1px;
      color: #fff;
      text-shadow: 0 0 15px rgba(124,58,237,0.4);
    }

    .brand {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a855f7, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #475569;
      animation: blink-status 1.5s ease-in-out infinite;
    }

    /* Spinner dots */
    .dots {
      display: flex; gap: 6px;
      margin-top: 4px;
    }
    .dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #7c3aed;
      animation: dot-bounce 1.4s ease-in-out infinite both;
    }
    .dots span:nth-child(2) { animation-delay: 0.16s; }
    .dots span:nth-child(3) { animation-delay: 0.32s; }

    .version {
      position: absolute;
      bottom: 12px; right: 16px;
      font-size: 9px;
      font-weight: 700;
      color: #1e1e38;
      letter-spacing: 2px;
    }

    /* Animations */
    @keyframes ring-fill {
      to { stroke-dashoffset: 55; }
    }
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes blink-status {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="logo-container">
    <div class="ring-wrap">
      <svg viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="35" fill="none" stroke-width="6" />
        <circle class="ring-fg" cx="40" cy="40" r="35" fill="none" stroke-width="6" stroke-linecap="round" />
      </svg>
      <div class="ring-text">L</div>
    </div>

    <div class="brand">LapScore</div>

    <div class="status">Starting health monitor</div>

    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="version">v1.0.0</div>
</body>
</html>
